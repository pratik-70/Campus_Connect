<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Connect | Dashboard</title>
  <meta name="description" content="Campus Connect dashboard for students and organizers." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ["Space Grotesk", "sans-serif"],
            body: ["Manrope", "sans-serif"]
          },
          animation: {
            fadeUp: "fadeUp .75s ease forwards",
            floatSlow: "floatSlow 7s ease-in-out infinite",
            glowPulse: "glowPulse 2.8s ease-in-out infinite"
          },
          keyframes: {
            fadeUp: {
              "0%": { opacity: "0", transform: "translateY(16px)" },
              "100%": { opacity: "1", transform: "translateY(0)" }
            },
            floatSlow: {
              "0%,100%": { transform: "translateY(0px)" },
              "50%": { transform: "translateY(-12px)" }
            },
            glowPulse: {
              "0%,100%": { opacity: "0.38", transform: "scale(1)" },
              "50%": { opacity: "0.7", transform: "scale(1.07)" }
            }
          }
        }
      }
    };
  </script>
</head>
<body class="font-body antialiased">
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
</body>
</html>
